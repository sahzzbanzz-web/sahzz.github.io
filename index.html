<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEWA BOT WhatsApp – SAHZZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --bg-card-hover: #1c1c28;
            --border: #2a2a3a;
            --green: #25D366;
            --green-dark: #1da851;
            --green-dim: rgba(37, 211, 102, 0.15);
            --green-glow: rgba(37, 211, 102, 0.3);
            --text-primary: #e8e8ef;
            --text-secondary: #8888a0;
            --text-dim: #55556a;
            --red: #ff4757;
            --yellow: #ffa502;
            --blue: #3742fa;
            --cyan: #00d2d3;
            --purple: #a55eea;
            --orange: #ff6348;
            --tg-blue: #2AABEE;
            --tg-dim: rgba(42,171,238,0.12);
            --tg-glow: rgba(42,171,238,0.3);
            --wa-bg: #0b141a;
            --wa-bubble-out: #005c4b;
            --wa-bubble-in: #1f2c34;
            --wa-header: #1f2c34;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                linear-gradient(rgba(37,211,102,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37,211,102,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px 100px;
        }

        .top-bar {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(10,10,15,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .top-bar-text { font-size: 12px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.3px; }
        .top-bar-text strong { color: var(--text-primary); font-weight: 600; }
        .top-bar-text .dash { color: var(--text-dim); margin: 0 2px; }

        .header { text-align: center; padding: 32px 0 12px; }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--green-dim);
            border: 1px solid rgba(37,211,102,0.25);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 600;
            color: var(--green);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 18px;
            animation: badgePulse 2s ease-in-out infinite;
        }
